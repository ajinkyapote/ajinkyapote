<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0705"/>
      <stop offset="55%" stop-color="#120a06"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>

    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c130b"/>
      <stop offset="100%" stop-color="#150e08"/>
    </linearGradient>

    <linearGradient id="emberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c00">
        <animate attributeName="stop-color" values="#ff8c00;#ffb347;#ff6f00;#ff8c00" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ffb347">
        <animate attributeName="stop-color" values="#ffb347;#ff6f00;#ffcf80;#ffb347" dur="7s" begin="0.6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#cc4400">
        <animate attributeName="stop-color" values="#cc4400;#ff8c00;#993300;#cc4400" dur="7s" begin="1.2s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="gridPat" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#ff8c00" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <clipPath id="roundedCanvas">
      <rect x="0" y="0" width="1180" height="610" rx="28"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedCanvas)">
    <rect width="1180" height="610" fill="url(#bgGrad)"/>
    <rect width="1180" height="610" fill="url(#gridPat)"/>
    <rect x="0" y="0" width="1180" height="610" fill="none" stroke="#ff6f00" stroke-opacity="0.25" stroke-width="1.5" rx="28"/>

    <!-- ============ LEFT PANEL : AT-A-GLANCE PROFILE CARD ============ -->
    <rect x="32" y="32" width="384" height="546" rx="20" fill="url(#panelGrad)" stroke="#ff6f00" stroke-opacity="0.18" stroke-width="1"/>

    <g font-family="'Segoe UI',Helvetica,Arial,sans-serif">

      <!-- monogram badge -->
      <g opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="0.1s" fill="freeze"/>
        <rect x="64" y="62" width="60" height="60" rx="16" fill="url(#emberGrad)" filter="url(#glow)"/>
        <text x="94" y="102" font-size="24" font-weight="700" fill="#150e08" text-anchor="middle">AP</text>
      </g>

      <!-- name + role -->
      <g opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="0.25s" fill="freeze"/>
        <text x="140" y="88" font-size="21" font-weight="700" fill="#f5e6d3">Ajinkya Pote</text>
        <text x="140" y="109" font-size="12.5" font-weight="600" fill="#ffb347" letter-spacing="0.4">SENIOR SOFTWARE ENGINEER</text>
      </g>

      <line x1="64" y1="140" x2="384" y2="140" stroke="#ff6f00" stroke-opacity="0.2" stroke-width="1"/>

      <!-- FOCUS AREAS -->
      <g opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="0.45s" fill="freeze"/>
        <text x="64" y="166" font-size="10.5" font-weight="700" fill="#8a7660" letter-spacing="1.5">FOCUS AREAS</text>

        <rect x="64" y="176" width="76" height="27" rx="13.5" fill="#241708" stroke="#ff8c00" stroke-opacity="0.4"/>
        <text x="102" y="193.5" font-size="12" fill="#ffd9a8" text-anchor="middle">Fintech</text>

        <rect x="148" y="176" width="92" height="27" rx="13.5" fill="#241708" stroke="#ff8c00" stroke-opacity="0.4"/>
        <text x="194" y="193.5" font-size="12" fill="#ffd9a8" text-anchor="middle">Logistics</text>

        <rect x="64" y="211" width="184" height="27" rx="13.5" fill="#241708" stroke="#ff8c00" stroke-opacity="0.4"/>
        <text x="156" y="228.5" font-size="12" fill="#ffd9a8" text-anchor="middle">Enterprise Backend</text>
      </g>

      <!-- CORE STACK -->
      <g opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="0.65s" fill="freeze"/>
        <text x="64" y="270" font-size="10.5" font-weight="700" fill="#8a7660" letter-spacing="1.5">CORE STACK</text>

        <rect x="64" y="280" width="72" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="100" y="297" font-size="11.5" fill="#f5e6d3" text-anchor="middle">Laravel</text>

        <rect x="144" y="280" width="76" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="182" y="297" font-size="11.5" fill="#f5e6d3" text-anchor="middle">Node.js</text>

        <rect x="228" y="280" width="66" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="261" y="297" font-size="11.5" fill="#f5e6d3" text-anchor="middle">React</text>

        <rect x="302" y="280" width="70" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="337" y="297" font-size="11.5" fill="#f5e6d3" text-anchor="middle">Redis</text>

        <rect x="64" y="314" width="74" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="101" y="331" font-size="11.5" fill="#f5e6d3" text-anchor="middle">MySQL</text>

        <rect x="146" y="314" width="76" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="184" y="331" font-size="11.5" fill="#f5e6d3" text-anchor="middle">Python</text>

        <rect x="230" y="314" width="142" height="26" rx="13" fill="#1c1310" stroke="#ff6f00" stroke-opacity="0.25"/>
        <text x="301" y="331" font-size="11.5" fill="#f5e6d3" text-anchor="middle">Express.js</text>
      </g>

      <line x1="64" y1="364" x2="384" y2="364" stroke="#ff6f00" stroke-opacity="0.2" stroke-width="1"/>

      <!-- FOCUS ALLOCATION bars -->
      <text x="64" y="386" font-size="10.5" font-weight="700" fill="#8a7660" letter-spacing="1.5">WHERE THE HOURS GO</text>

      <g font-size="11.5" fill="#d8c9b8">
        <text x="64" y="406">Backend Engineering</text>
        <rect x="64" y="413" width="256" height="6" rx="3" fill="#241708"/>
        <rect x="64" y="413" width="0" height="6" rx="3" fill="url(#emberGrad)">
          <animate attributeName="width" to="242" dur="0.8s" begin="0.9s" fill="freeze"/>
        </rect>

        <text x="64" y="440">Full-Stack Delivery</text>
        <rect x="64" y="447" width="256" height="6" rx="3" fill="#241708"/>
        <rect x="64" y="447" width="0" height="6" rx="3" fill="url(#emberGrad)">
          <animate attributeName="width" to="212" dur="0.8s" begin="1.05s" fill="freeze"/>
        </rect>

        <text x="64" y="474">Cloud &amp; DevOps</text>
        <rect x="64" y="481" width="256" height="6" rx="3" fill="#241708"/>
        <rect x="64" y="481" width="0" height="6" rx="3" fill="url(#emberGrad)">
          <animate attributeName="width" to="167" dur="0.8s" begin="1.2s" fill="freeze"/>
        </rect>

        <text x="64" y="508">System Design</text>
        <rect x="64" y="515" width="256" height="6" rx="3" fill="#241708"/>
        <rect x="64" y="515" width="0" height="6" rx="3" fill="url(#emberGrad)">
          <animate attributeName="width" to="185" dur="0.8s" begin="1.35s" fill="freeze"/>
        </rect>
      </g>

      <!-- status line -->
      <g opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="1.6s" fill="freeze"/>
        <circle cx="68" cy="546" r="4" fill="#ff8c00">
          <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="1.6s" repeatCount="indefinite"/>
        </circle>
        <text x="80" y="550" font-size="11.5" fill="#ffd9a8">Building fintech &amp; logistics platforms</text>
        <text x="64" y="570" font-size="11" fill="#8a7660">Navi Mumbai, India</text>
      </g>

    </g>

    <!-- ============ RIGHT PANEL : TERMINAL ============ -->
    <rect x="448" y="32" width="700" height="546" rx="20" fill="url(#panelGrad)" stroke="#ff6f00" stroke-opacity="0.18" stroke-width="1"/>

    <!-- title bar -->
    <path d="M448 52 a20 20 0 0 1 20 -20 h660 a20 20 0 0 1 20 20 v20 h-700 z" fill="#150d08" opacity="0.6"/>
    <line x1="448" y1="72" x2="1148" y2="72" stroke="#ff6f00" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="476" cy="52" r="6" fill="#ff8c00"/>
    <circle cx="496" cy="52" r="6" fill="#cc4400"/>
    <circle cx="516" cy="52" r="6" fill="#ffb347"/>
    <text x="540" y="57" font-size="13" fill="#8a7660" font-family="'JetBrains Mono',Consolas,monospace">ajinkya@fyntune — zsh</text>

    <g font-size="14.5" font-family="'JetBrains Mono',Consolas,monospace">
      <!-- L1 -->
      <clipPath id="c1"><rect x="472" y="88" width="0" height="20"><animate attributeName="width" to="640" dur="0.6s" begin="1.0s" fill="freeze" id="a1"/></rect></clipPath>
      <g clip-path="url(#c1)"><text x="472" y="102"><tspan fill="#ff8c00">visitor@readme:~$ </tspan><tspan fill="#f5e6d3">whoami</tspan></text></g>

      <!-- L2 -->
      <clipPath id="c2"><rect x="472" y="112" width="0" height="20"><animate attributeName="width" to="640" dur="1.02s" begin="1.75s" fill="freeze" id="a2"/></rect></clipPath>
      <g clip-path="url(#c2)"><text x="472" y="126" fill="#ffd9a8">→ Ajinkya Pote, Senior Software Engineer</text></g>

      <!-- L4 -->
      <clipPath id="c4"><rect x="472" y="152" width="0" height="20"><animate attributeName="width" to="640" dur="0.82s" begin="2.92s" fill="freeze" id="a4"/></rect></clipPath>
      <g clip-path="url(#c4)"><text x="472" y="166"><tspan fill="#ff8c00">visitor@readme:~$ </tspan><tspan fill="#f5e6d3">cat focus.json</tspan></text></g>

      <!-- L5 -->
      <clipPath id="c5"><rect x="472" y="176" width="0" height="20"><animate attributeName="width" to="640" dur="0.25s" begin="3.89s" fill="freeze" id="a5"/></rect></clipPath>
      <g clip-path="url(#c5)"><text x="472" y="190" fill="#8a7660">{{</text></g>

      <!-- L6 -->
      <clipPath id="c6"><rect x="472" y="200" width="0" height="20"><animate attributeName="width" to="640" dur="1.25s" begin="4.29s" fill="freeze" id="a6"/></rect></clipPath>
      <g clip-path="url(#c6)"><text x="472" y="214"><tspan fill="#ffb347">  "backend":</tspan><tspan fill="#f5e6d3">  ["Laravel", "Node.js", "Express"],</tspan></text></g>

      <!-- L7 -->
      <clipPath id="c7"><rect x="472" y="224" width="0" height="20"><animate attributeName="width" to="640" dur="0.85s" begin="5.69s" fill="freeze" id="a7"/></rect></clipPath>
      <g clip-path="url(#c7)"><text x="472" y="238"><tspan fill="#ffb347">  "frontend":</tspan><tspan fill="#f5e6d3"> ["React", "Redux"],</tspan></text></g>

      <!-- L8 -->
      <clipPath id="c8"><rect x="472" y="248" width="0" height="20"><animate attributeName="width" to="640" dur="0.85s" begin="6.69s" fill="freeze" id="a8"/></rect></clipPath>
      <g clip-path="url(#c8)"><text x="472" y="262"><tspan fill="#ffb347">  "database":</tspan><tspan fill="#f5e6d3"> ["MySQL", "Redis"],</tspan></text></g>

      <!-- L9 -->
      <clipPath id="c9"><rect x="472" y="272" width="0" height="20"><animate attributeName="width" to="640" dur="1.02s" begin="7.69s" fill="freeze" id="a9"/></rect></clipPath>
      <g clip-path="url(#c9)"><text x="472" y="286"><tspan fill="#ffb347">  "cloud":</tspan><tspan fill="#f5e6d3">    ["AWS", "Docker", "CI/CD"]</tspan></text></g>

      <!-- L10 -->
      <clipPath id="c10"><rect x="472" y="296" width="0" height="20"><animate attributeName="width" to="640" dur="0.25s" begin="8.86s" fill="freeze" id="a10"/></rect></clipPath>
      <g clip-path="url(#c10)"><text x="472" y="310" fill="#8a7660">}}</text></g>

      <!-- L12 -->
      <clipPath id="c12"><rect x="472" y="336" width="0" height="20"><animate attributeName="width" to="640" dur="0.9s" begin="9.26s" fill="freeze" id="a12"/></rect></clipPath>
      <g clip-path="url(#c12)"><text x="472" y="350"><tspan fill="#ff8c00">visitor@readme:~$ </tspan><tspan fill="#f5e6d3">./deploy --status</tspan></text></g>

      <!-- L13 -->
      <clipPath id="c13"><rect x="472" y="360" width="0" height="20"><animate attributeName="width" to="640" dur="1.05s" begin="10.31s" fill="freeze" id="a13"/></rect></clipPath>
      <g clip-path="url(#c13)"><text x="472" y="374" fill="#ffd9a8">→ Full-stack ownership: schema → API → UI</text></g>

      <!-- L14 -->
      <clipPath id="c14"><rect x="472" y="384" width="0" height="20"><animate attributeName="width" to="640" dur="1.25s" begin="11.51s" fill="freeze" id="a14"/></rect></clipPath>
      <g clip-path="url(#c14)"><text x="472" y="398" fill="#ffd9a8">→ Building fintech &amp; logistics platforms at scale</text></g>

      <!-- L15 prompt + blinking cursor -->
      <g opacity="0">
        <animate attributeName="opacity" to="1" dur="0.3s" begin="12.96s" fill="freeze"/>
        <text x="472" y="422" fill="#ff8c00">visitor@readme:~$</text>
        <rect x="616" y="409" width="10" height="17" fill="#ffb347">
          <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1s" begin="13.1s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>
  </g>
</svg>
